$schema: https://json-schema.org/draft/2020-12/schema
$id: https://github.com/mj3b/governed-decision-intelligence/blob/main/schema/gdr.schema.json
title: Governed Decision Record (GDR)
description: Schema-validated artifact capturing a single consequential AI-informed
  decision at the point where a prediction becomes a human-authorized action. The
  GDR is written before execution. An artifact written after the fact is a narrative.
  An artifact written before execution is evidence. Part of the Governed Decision
  Intelligence (GDI) specification v2.0.
type: object
additionalProperties: false
required:
- gdr_id
- gdr_version
- created_at
- agent_id
- decision_question
- ai_prediction
- options_considered
- evidence_base
- risk_posture
- decision_outcome
- accountability_chain
- data_provenance
- confidence_assessment
- gate_classification
- record_hash
properties:
  gdr_id:
    type: string
    description: Stable unique identifier for this governed decision record.
    pattern: ^GDR-[A-Za-z0-9\-]+$
  gdr_version:
    type: string
    description: Version of the GDI specification this record conforms to.
    enum:
    - '2.0'
  created_at:
    type: string
    format: date-time
    description: ISO 8601 UTC timestamp. Set at classification time, before execution.
  executed_at:
    type:
    - string
    - 'null'
    format: date-time
    description: ISO 8601 UTC timestamp set after execution completes. Null until
      execution.
  agent_id:
    type: string
    minLength: 1
    description: Identity of the agent or system making the decision.
  session_id:
    type:
    - string
    - 'null'
    description: Optional session or run identifier for tracing decision chains.
  decision_question:
    type: object
    additionalProperties: false
    required:
    - question
    - scope
    description: The specific question being decided.
    properties:
      question:
        type: string
        minLength: 10
        description: Plain-language statement of the decision being made.
      scope:
        type: string
        description: 'Bounded scope of the decision: what is and is not being decided.'
      deadline:
        type:
        - string
        - 'null'
        format: date-time
        description: Decision deadline if time-constrained.
  ai_prediction:
    type: object
    additionalProperties: false
    required:
    - model_id
    - prediction_type
    - output_summary
    - confidence_score
    description: The AI model output that informed this decision.
    properties:
      model_id:
        type: string
        description: Identity and version of the model that produced the prediction.
      prediction_type:
        type: string
        enum:
        - classification
        - recommendation
        - generation
        - retrieval
        - action_selection
        - risk_score
        - other
      output_summary:
        type: string
        description: Plain-language summary of what the AI predicted or recommended.
      confidence_score:
        type:
        - number
        - 'null'
        minimum: 0.0
        maximum: 1.0
        description: Model confidence in the prediction. 0.0–1.0. Null if not available.
      known_limitations:
        type: string
        description: Documented limitations of the model relevant to this prediction.
      alternatives_evaluated:
        type: array
        items:
          type: string
        default: []
        description: Other predictions or recommendations the model evaluated.
  options_considered:
    type: array
    minItems: 2
    description: At least two options evaluated, including inaction. Schema-enforced
      minimum of two.
    items:
      type: object
      additionalProperties: false
      required:
      - option_id
      - description
      properties:
        option_id:
          type: string
        description:
          type: string
          minLength: 5
        pros:
          type: array
          items:
            type: string
          default: []
        cons:
          type: array
          items:
            type: string
          default: []
        estimated_impact:
          type: string
  evidence_base:
    type: object
    additionalProperties: false
    required:
    - items
    properties:
      items:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required:
          - evidence_id
          - source_type
          - description
          - completeness_state
          - confidence
          properties:
            evidence_id:
              type: string
            source_type:
              type: string
              enum:
              - structured_data
              - unstructured_retrieval
              - model_output
              - human_input
              - policy_document
              - external_api
              - sensor_stream
              - other
            description:
              type: string
              minLength: 3
            location_ref:
              type: string
            freshness:
              type:
              - string
              - 'null'
              format: date-time
              description: When this evidence was last verified or retrieved.
            completeness_state:
              type: string
              enum:
              - complete
              - partial
              - placeholder
              description: 'complete: verified and decision-ready. partial: informative
                but incomplete. placeholder: known gap.'
            confidence:
              type: string
              enum:
              - high
              - medium
              - low
  risk_posture:
    type: object
    additionalProperties: false
    required:
    - stance
    - residual_risk_statement
    - risk_acceptance_required
    properties:
      stance:
        type: string
        enum:
        - risk_minimizing
        - risk_neutral
        - risk_accepting
      key_risks:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
          - risk
          - severity
          - mitigation
          properties:
            risk:
              type: string
            severity:
              type: string
              enum:
              - low
              - medium
              - high
              - critical
            mitigation:
              type: string
        default: []
      residual_risk_statement:
        type: string
        description: What risk remains after this decision executes, even with conditions
          applied.
      risk_acceptance_required:
        type: boolean
        description: Whether explicit human risk acceptance is required before execution.
  decision_outcome:
    type: object
    additionalProperties: false
    required:
    - outcome
    - selected_option_id
    - rationale_summary
    properties:
      outcome:
        type: string
        enum:
        - go
        - conditional_go
        - defer
        - no_go
        - escalate
        description: The governed decision outcome. Defer and no-go are first-class
          outcomes with equal rigor to go decisions.
      selected_option_id:
        type:
        - string
        - 'null'
        description: The option_id of the selected option from options_considered.
      conditions:
        type: array
        description: Required when outcome is conditional_go. Schema-validated conditions
          with named owners.
        items:
          type: object
          additionalProperties: false
          required:
          - condition
          - owner
          - due_date
          - evidence_to_close
          properties:
            condition:
              type: string
              minLength: 5
            owner:
              type: string
            due_date:
              type: string
              format: date
            evidence_to_close:
              type: string
        default: []
      rationale_summary:
        type: string
        minLength: 50
        description: Plain-language explanation of why this decision is defensible
          given the evidence and risk at the time of decision.
      reasoning_reconstruction:
        type:
        - string
        - 'null'
        description: Human-readable reconstruction of the reasoning chain. May be
          AI-generated at decision time for audit readability.
  accountability_chain:
    type: object
    additionalProperties: false
    required:
    - decision_owner
    - governance_covenant
    description: Named humans at every decision point. No delegation to systems.
    properties:
      decision_owner:
        type: object
        additionalProperties: false
        required:
        - name
        - role
        properties:
          name:
            type: string
            minLength: 2
          role:
            type: string
            minLength: 2
      reviewers:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
          - name
          - role
          properties:
            name:
              type: string
            role:
              type: string
            reviewed_at:
              type:
              - string
              - 'null'
              format: date-time
            disposition:
              type:
              - string
              - 'null'
              enum:
              - approved
              - rejected
              - request_changes
              - null
        default: []
      governance_covenant:
        type: string
        description: Reference to the governance covenant defining what this agent
          is authorized to decide and what must be escalated.
      authority_scope:
        type: string
        enum:
        - recommend
        - decide
        - veto
        default: decide
      escalation_path:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
          - name
          - role
          properties:
            name:
              type: string
            role:
              type: string
        default: []
  data_provenance:
    type: object
    additionalProperties: false
    required:
    - structured_sources
    - unstructured_sources
    description: Dual-provenance record spanning structured and unstructured data
      sources. Required because AI decisions increasingly draw from both simultaneously.
    properties:
      structured_sources:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
          - source_id
          - source_type
          properties:
            source_id:
              type: string
            source_type:
              type: string
              enum:
              - sql_table
              - data_frame
              - api_response
              - database_query
              - other
            query_ref:
              type:
              - string
              - 'null'
            freshness:
              type:
              - string
              - 'null'
              format: date-time
            governance_status:
              type: string
              enum:
              - governed
              - ungoverned
              - unknown
              default: unknown
        default: []
      unstructured_sources:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
          - source_id
          - retrieval_type
          properties:
            source_id:
              type: string
            retrieval_type:
              type: string
              enum:
              - vector_search
              - document_retrieval
              - image
              - audio
              - sensor_stream
              - other
            embedding_model:
              type:
              - string
              - 'null'
            retrieval_confidence:
              type:
              - number
              - 'null'
              minimum: 0.0
              maximum: 1.0
            relevance_score:
              type:
              - number
              - 'null'
              minimum: 0.0
              maximum: 1.0
            governance_status:
              type: string
              enum:
              - governed
              - ungoverned
              - unknown
              default: unknown
        default: []
  confidence_assessment:
    type: object
    additionalProperties: false
    required:
    - zone
    - policy_threshold
    description: GDI confidence zone classification. Green/Amber/Red determines governance
      response.
    properties:
      zone:
        type: string
        enum:
        - GREEN
        - AMBER
        - RED
        description: 'GREEN: high confidence, proceed within pre-authorized parameters.
          AMBER: uncertain range, synchronous human review required. RED: low confidence
          or out of bounds, mandatory escalation.'
      confidence_score:
        type:
        - number
        - 'null'
        minimum: 0.0
        maximum: 1.0
      policy_threshold:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: The confidence threshold defined by governance policy for this
          decision type.
      zone_rationale:
        type: string
        description: Explanation of why this confidence zone was assigned.
  gate_classification:
    type: object
    additionalProperties: false
    required:
    - gate
    - gate_rationale
    - escalation_required
    description: 'GDI gate taxonomy classification. The gate answers: what level of
      human deliberation does this decision require?'
    properties:
      gate:
        type: string
        enum:
        - gate_1_routine
        - gate_2_documented_delegation
        - gate_3_elevated_review
        - gate_4_hard_escalation
        description: 'gate_1: routine, no deliberation required. gate_2: pre-authorized
          delegation. gate_3: mandatory human review. gate_4: execution halts, human
          authorization required.'
      gate_rationale:
        type: string
        description: Institutional explanation of why this gate level was assigned.
      escalation_required:
        type: boolean
        description: True when gate_4 fires. Execution must halt.
      escalation_trigger:
        type:
        - string
        - 'null'
        description: 'What triggered escalation: policy_denied, confidence_below_threshold,
          hard_escalation_tool_class, etc.'
      delegation_reference:
        type:
        - string
        - 'null'
        description: 'For gate_2: reference to the upstream human authority whose
          prior deliberation covers this decision.'
  downstream_propagation:
    type: object
    additionalProperties: false
    required:
    - propagation_required
    description: What must change if this decision changes. Prevents silent ripple
      effects.
    properties:
      propagation_required:
        type: boolean
      affected_systems:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
          - system
          - impact
          properties:
            system:
              type: string
            impact:
              type: string
            owner:
              type:
              - string
              - 'null'
        default: []
    default:
      propagation_required: false
      affected_systems: []
  ai_assistance_disclosure:
    type: object
    additionalProperties: false
    required:
    - used
    description: Structured disclosure when AI assistance was used in producing this
      record. AI outputs are never authoritative by default.
    properties:
      used:
        type: boolean
      tool_name:
        type:
        - string
        - 'null'
      tool_purpose:
        type:
        - string
        - 'null'
      human_review_completed:
        type: boolean
        default: false
      confidence_band:
        type:
        - string
        - 'null'
        enum:
        - low
        - medium
        - high
        - null
      cautions:
        type:
        - string
        - 'null'
    default:
      used: false
  audit:
    type: object
    additionalProperties: false
    required:
    - record_version
    - retention_class
    properties:
      record_version:
        type: integer
        minimum: 1
      change_log:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
          - version
          - changed_by
          - changed_at
          - summary
          properties:
            version:
              type: integer
              minimum: 1
            changed_by:
              type: string
            changed_at:
              type: string
              format: date-time
            summary:
              type: string
        default: []
      supersedes:
        type:
        - string
        - 'null'
      superseded_by:
        type:
        - string
        - 'null'
      retention_class:
        type: string
        enum:
        - draft
        - controlled_record
  record_hash:
    type: string
    description: SHA-256 hash of core immutable fields computed at classification
      time. Any post-hoc modification produces a hash mismatch. This field enables
      tamper detection.
allOf:
- if:
    properties:
      decision_outcome:
        properties:
          outcome:
            const: conditional_go
  then:
    properties:
      decision_outcome:
        properties:
          conditions:
            minItems: 1
- if:
    properties:
      gate_classification:
        properties:
          gate:
            const: gate_4_hard_escalation
  then:
    properties:
      gate_classification:
        properties:
          escalation_required:
            const: true
